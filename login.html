<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - health is wealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="auth-header">
        <a class="brand" href="index.html"><i class="fa-solid fa-heart-pulse" aria-hidden="true"></i> health is wealth</a>
        <div class="user-area" aria-live="polite"></div>
    </header>
    <main class="auth-main">
        <form id="login-form" class="login-form" action="#" method="post" autocomplete="on">
            <h1>Welcome Back</h1>
            
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password" required>

            <div class="text-end">
                <a href="forgot-password.html" style="font-size:0.9rem;text-decoration:none;">Forgot Password?</a>
            </div>

            <div id="form-msg" role="status" aria-live="polite"></div>

            <button type="submit" class="btn-primary"><i class="fa-solid fa-sign-in-alt" aria-hidden="true"></i> Login</button>
            <p class="muted">Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
    </main>

<script>
(function(){
    const form = document.getElementById('login-form');
    const msg = document.getElementById('form-msg');

    function showError(text){
        msg.textContent = text;
        msg.className = 'form-error';
    }
    function showSuccess(text){
        msg.textContent = text;
        msg.className = 'form-success';
    }

    // Check if already logged in
    try{
        const raw = localStorage.getItem('abc_hotel_current');
        if(raw){
            const user = JSON.parse(raw);
            if(user && (user.firstname || user.fullname)){
                const name = user.firstname || user.fullname;
                form.innerHTML = `<div class="form-success">You are signed in as <strong>${name}</strong>.</div><div style="margin-top:8px"><a href="index.html" class="btn btn-primary">Go to site</a> <button id="logout-btn" class="btn btn-outline-primary">Logout</button></div>`;
                const btn = document.getElementById('logout-btn');
                if(btn){
                    btn.addEventListener('click', function(e){ 
                        e.preventDefault(); 
                        localStorage.removeItem('abc_hotel_current'); 
                        window.location.reload(); 
                    });
                }
                return;
            }
        }
    }catch(e){}

    form.addEventListener('submit', function(e){
        e.preventDefault();
        msg.textContent = '';
        msg.className = '';

        const email = form.email.value.trim();
        const password = form.password.value;

        try {
            const usersRaw = localStorage.getItem('abc_hotel_users');
            const users = usersRaw ? JSON.parse(usersRaw) : [];
            const user = users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase() && u.password === password);

            if(user){
                localStorage.setItem('abc_hotel_current', JSON.stringify(user));
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } else {
                showError('Invalid email or password.');
            }
        } catch(err) {
            showError('An error occurred during login.');
        }
    });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
