<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - health is wealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style/login.css">
</head>
<body>
    <header class="auth-header">
        <a class="brand" href="index.html"><i class="fa-solid fa-heart-pulse" aria-hidden="true"></i> health is wealth</a>
        <div class="user-area" aria-live="polite"></div>
    </header>
    <main class="auth-main">
        <form id="login-form" class="login-form" action="#" method="post" autocomplete="on">
            <h1>Welcome Back</h1>
            
            <label for="email">Email</label>
           <input id="login-email" name="email" type="email" placeholder="you@example.com" required>


            <label for="password">Password</label>
            <input id="login-password" name="password" type="password" placeholder="Enter your password" required> 

            <div class="text-end">
                <a href="forgot-password.html" style="font-size:0.9rem;text-decoration:none;">Forgot Password?</a>
            </div>

            <div id="form-msg" role="status" aria-live="polite"></div>

            <button type="submit" class="btn-primary"><i class="fa-solid fa-sign-in-alt" aria-hidden="true"></i> Login</button>
            <p class="muted">Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>
    </main>

<script src="/scripts/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
