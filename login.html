<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - health is wealth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style/login.css">
</head>
<body>
    <header class="auth-header">
        <a class="brand" href="index.html"><i class="fa-solid fa-heart-pulse" aria-hidden="true"></i> HealthCare Dashboard</a>
        <div class="user-area" aria-live="polite"></div>
    </header>
    <main class="auth-main">
        <div class="login-container">
  <form id="login-form" class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your health dashboard</p>

    <div class="input-group">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input id="login-password" type="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" id="login-btn">
      <span class="btn-text">Login</span>
      <span class="loader hidden"></span>
    </button>

    <div class="signup-link" style="text-align:center; margin-top:15px;">
        <span>Don't have an account?</span>
        <a href="signup.html">Sign Up</a>
    </div>

    <p id="form-msg"></p>
  </form>
</div>
    </main>

<script src="/scripts/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
