<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style/styles.css">
</head>
<body class="p-4">
    <h2 class="text-success mb-4">⚙️ Admin Dashboard</h2>

    <!-- create appointment -->
    <div class="card shadow-sm p-3 mb-4">
        <h5>Create Appointment for Patient</h5>
        <form id="create-appointment-form" class="mt-3">
            <div class="row">
                <div class="col-md-3">
                    <label for="patient-select" class="form-label">Patient</label>
                    <select id="patient-select" class="form-select" required>
                        <option value="">Select Patient</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="service-select" class="form-label">Service</label>
                    <select id="service-select" class="form-select" required>
                        <option value="">Select Service</option>
                        <option value="General Checkup">General Checkup</option>
                        <option value="Dental Care">Dental Care</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Orthopedics">Orthopedics</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="appointment-date" class="form-label">Date</label>
                    <input type="date" id="appointment-date" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label for="appointment-time" class="form-label">Time</label>
                    <input type="time" id="appointment-time" class="form-control" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-success">Create Appointment</button>
                </div>
            </div>
        </form>
    </div>

    <!-- stats -->
     <div class="row mb-4">
        <div class="col-mb-4">
            <div class="card p-3 shadow-sm">
                <h5>Total Appointments</h5>
                <h3 id="total-count"></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Pending</h5>
                <h3 id="pending-count"></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow-sm">
                <h5>Completed</h5>
                <h3 id="completed-count"></h3>
            </div>
        </div>
     </div>

     <!-- table -->
      <div class="card shadow-sm p-3">
        <h5>All Appointments</h5>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Service</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th></th>
                </tr>
            </thead>
            <tbody id="admin-table"></tbody>
        </table>
      </div>

      <!-- patients table -->
      <div class="card shadow-sm p-3 mt-4">
        <h5>All Registered Patients</h5>

        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Appointment Details</th>
                </tr>
            </thead>
            <tbody id="patients-table"></tbody>
        </table>
      </div>

    <script src="/scripts/admin.js"></script>
    
</body>
</html>
